<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V2 — Style Directions (one palette, three styles)</title>
<style>
  /* ONE fixed palette for all three — so only STYLE differs, not color.
     (Any of the 20/40 rotating themes would swap these values identically.) */
  :root {
    --bg:#15151c; --surface:#1f1f2a; --surface-alt:#2a2a37; --text:#e7e3d8;
    --muted:#8b8678; --accent:#c9a25a; --accent-ink:#1a1407;
    --border:#31313f; --me:#3a3550; --me-text:#efe9f4;
    --ok:#4caf50; --warn:#e0a83e; --bad:#e05a4e; --pill-bg:#243024; --pill-ink:#7fce82;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0b0b0f; color:#ddd; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; padding:24px 12px 60px; }
  .intro { max-width:1200px; margin:0 auto 26px; text-align:center; }
  .intro h1 { font-size:21px; margin-bottom:6px; }
  .intro p { color:#9a9a9a; font-size:13px; line-height:1.5; }
  .intro b { color:#c9a25a; }
  .lineup { display:flex; flex-wrap:wrap; gap:30px; justify-content:center; align-items:flex-start; max-width:1320px; margin:0 auto; }
  .col { width:360px; }
  .col-label { text-align:center; margin-bottom:10px; }
  .col-label .name { font-size:16px; font-weight:700; color:#e7e3d8; }
  .col-label .desc { font-size:12px; color:#888; margin-top:3px; line-height:1.45; }
  .phone { width:360px; height:744px; border-radius:36px; overflow:hidden; border:3px solid #2a2a32; display:flex; flex-direction:column; }
  .screen { flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg); color:var(--text); }

  /* ===== shared skeleton (geometry overridden per style) ===== */
  .banner { display:flex; align-items:center; gap:8px; background:var(--surface); border-bottom:1px solid var(--border); color:var(--muted); }
  .banner .loc { color:var(--text); font-weight:600; }
  .banner .dot { opacity:.45; }
  .tiles { display:flex; background:var(--bg); }
  .tile { flex:1; background:var(--surface); }
  .tile .nm { font-weight:700; display:flex; justify-content:space-between; align-items:baseline; }
  .tile .cls { color:var(--muted); }
  .hpbar { background:var(--surface-alt); overflow:hidden; }
  .hpfill { height:100%; }
  .situ { display:flex; gap:6px; overflow:hidden; background:var(--bg); }
  .chip { white-space:nowrap; background:var(--surface-alt); color:var(--muted); }
  .chip.main { background:var(--accent); color:var(--accent-ink); font-weight:700; }
  .tabs { display:flex; background:var(--bg); }
  .tab { color:var(--muted); }
  .tab.on { color:var(--text); }
  .feed { flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg); }
  .msg.dm .who { color:var(--muted); text-transform:uppercase; letter-spacing:.07em; }
  .msg.dm .body em { color:var(--accent); font-style:italic; }
  .pills { display:flex; gap:6px; flex-wrap:wrap; }
  .pill { background:var(--pill-bg); color:var(--pill-ink); }
  .msg.me { align-self:flex-end; background:var(--me); color:var(--me-text); }
  .input { display:flex; align-items:center; background:var(--surface); border-top:1px solid var(--border); }
  .field { flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text); }
  .send { background:var(--accent); color:var(--accent-ink); font-weight:700; }
  .nav { display:flex; background:var(--bg); border-top:1px solid var(--border); }
  .nav .it { flex:1; text-align:center; color:var(--muted); }
  .nav .it.on { color:var(--accent); }

  /* ════ 1 · DENSE — info-first, compact, v1 heritage ════ */
  .dense .banner { padding:7px 12px; font-size:11px; }
  .dense .tiles { padding:6px 10px; gap:6px; }
  .dense .tile { padding:6px 8px; border:1px solid var(--border); border-radius:4px; }
  .dense .tile .nm { font-size:12px; } .dense .tile .cls { font-size:9px; }
  .dense .hpbar { height:4px; border-radius:2px; margin:4px 0 2px; }
  .dense .tile .hp { font-size:10px; }
  .dense .situ { padding:2px 10px 6px; font-size:10px; }
  .dense .chip { padding:2px 7px; border-radius:3px; }
  .dense .tabs { padding:4px 10px 0; gap:2px; font-size:11px; }
  .dense .tab { padding:4px 10px; border-bottom:2px solid transparent; }
  .dense .tab.on { border-bottom:2px solid var(--accent); }
  .dense .feed { padding:8px 10px; gap:8px; }
  .dense .msg { font-size:12px; line-height:1.42; }
  .dense .msg.dm .who { font-size:9px; margin-bottom:2px; }
  .dense .pills { margin-top:5px; } .dense .pill { font-size:9px; padding:1px 6px; border-radius:3px; }
  .dense .msg.me { max-width:82%; padding:6px 9px; border-radius:6px 6px 1px 6px; font-size:12px; }
  .dense .input { padding:8px 10px; gap:6px; }
  .dense .field { padding:7px 10px; border-radius:5px; font-size:12px; }
  .dense .send { padding:7px 11px; border-radius:5px; font-size:12px; }
  .dense .nav .it { padding:9px 0 12px; font-size:10px; }

  /* ════ 2 · AIRY — editorial, spacious, prose-forward chat ════ */
  .airy .banner { padding:13px 18px; font-size:12px; gap:10px; }
  .airy .tiles { padding:12px 16px; gap:12px; }
  .airy .tile { padding:12px 14px; border-radius:10px; }
  .airy .tile .nm { font-size:15px; } .airy .tile .cls { font-size:11px; margin-top:1px; }
  .airy .hpbar { height:6px; border-radius:3px; margin:9px 0 5px; }
  .airy .tile .hp { font-size:12px; font-weight:600; }
  .airy .situ { padding:4px 16px 12px; font-size:12px; gap:8px; }
  .airy .chip { padding:5px 12px; border-radius:20px; }
  .airy .tabs { padding:6px 16px 0; gap:6px; font-size:13px; }
  .airy .tab { padding:7px 4px; margin-right:10px; border-bottom:2px solid transparent; }
  .airy .tab.on { border-bottom:2px solid var(--accent); }
  .airy .feed { padding:16px 18px; gap:20px; }
  .airy .msg { font-size:15px; line-height:1.62; }
  /* DM as full-width prose, no bubble — reads like a story */
  .airy .msg.dm .who { font-size:10px; margin-bottom:6px; }
  .airy .pills { margin-top:11px; } .airy .pill { font-size:11px; padding:3px 10px; border-radius:6px; }
  .airy .msg.me { max-width:78%; padding:10px 14px; border-radius:14px 14px 4px 14px; font-size:14px; }
  .airy .input { padding:12px 16px; gap:10px; }
  .airy .field { padding:11px 15px; border-radius:24px; font-size:14px; }
  .airy .send { padding:11px 18px; border-radius:24px; }
  .airy .nav .it { padding:13px 0 16px; font-size:11px; }

  /* ════ 3 · TACTILE — chunky cards, shadows, bubble chat, big targets ════ */
  .tactile .screen { background:var(--bg); }
  .tactile .banner { padding:12px 16px; font-size:12px; gap:8px; background:var(--surface); border-bottom:none; box-shadow:0 2px 8px rgba(0,0,0,.35); position:relative; z-index:2; }
  .tactile .tiles { padding:12px; gap:10px; }
  .tactile .tile { padding:12px; border-radius:18px; box-shadow:0 3px 10px rgba(0,0,0,.35); }
  .tactile .tile .nm { font-size:14px; } .tactile .tile .cls { font-size:11px; }
  .tactile .hpbar { height:8px; border-radius:6px; margin:9px 0 4px; }
  .tactile .tile .hp { font-size:12px; }
  .tactile .situ { padding:2px 12px 12px; font-size:12px; gap:8px; }
  .tactile .chip { padding:6px 13px; border-radius:16px; box-shadow:0 2px 6px rgba(0,0,0,.3); }
  .tactile .tabs { padding:6px 12px 2px; gap:8px; font-size:13px; }
  .tactile .tab { padding:7px 16px; border-radius:16px; }
  .tactile .tab.on { background:var(--surface-alt); color:var(--text); font-weight:700; }
  .tactile .feed { padding:14px 12px; gap:14px; }
  .tactile .msg { font-size:14px; line-height:1.55; }
  .tactile .msg.dm .body { background:var(--surface); padding:12px 14px; border-radius:18px 18px 18px 6px; box-shadow:0 2px 8px rgba(0,0,0,.3); }
  .tactile .msg.dm .who { font-size:10px; margin:0 0 6px 4px; }
  .tactile .pills { margin-top:10px; } .tactile .pill { font-size:11px; padding:4px 11px; border-radius:14px; }
  .tactile .msg.me { max-width:80%; padding:11px 15px; border-radius:20px 20px 6px 20px; font-size:14px; box-shadow:0 2px 8px rgba(0,0,0,.3); }
  .tactile .input { padding:12px; gap:10px; border-top:none; box-shadow:0 -2px 10px rgba(0,0,0,.35); }
  .tactile .field { padding:13px 16px; border-radius:26px; border:none; font-size:14px; background:var(--surface-alt); }
  .tactile .send { padding:13px 20px; border-radius:26px; }
  .tactile .nav { border-top:none; box-shadow:0 -2px 10px rgba(0,0,0,.35); }
  .tactile .nav .it { padding:14px 0 18px; font-size:12px; }
</style>
</head>
<body>
  <div class="intro">
    <h1>Three <b>styles</b> — one palette, so only the structure differs</h1>
    <p>Same colors (a single dark theme) across all three. What changes is the <b>style</b>:<br>
       density, type size, corner/shape language, and how the chat reads. Pick the skeleton; color rotates on top.</p>
  </div>
  <div class="lineup" id="lineup"></div>

  <script>
    function screen() {
      return `
        <div class="banner"><span class="loc">🏚 Hunting Lodge Ruins</span><span class="dot">·</span><span>Day 26, 1:15 AM</span><span class="dot">·</span><span>Clear</span></div>
        <div class="tiles">
          <div class="tile"><div class="nm">Ivy <span class="hp">31/31</span></div><div class="cls">Rogue 4</div><div class="hpbar"><div class="hpfill" style="width:100%;background:var(--ok);"></div></div></div>
          <div class="tile"><div class="nm">Thorn <span class="hp">18/27</span></div><div class="cls">Bard 4</div><div class="hpbar"><div class="hpfill" style="width:66%;background:var(--warn);"></div></div></div>
        </div>
        <div class="situ"><span class="chip main">★ Stop the cult</span><span class="chip">Find the egg</span><span class="chip">Rescue Leosin</span></div>
        <div class="tabs"><span class="tab on">Narrative</span><span class="tab">OOC</span></div>
        <div class="feed">
          <div class="msg dm"><div class="who">Dungeon Master</div><div class="body">The lodge's broken door hangs on one hinge. <em>Ivy</em>, your boots find old bloodstains beneath the ash — something moved through here recently. A low growl rolls out of the dark.<div class="pills"><span class="pill">⚔ Combat</span><span class="pill">+1 Kobold</span></div></div></div>
          <div class="msg me"><div class="body">I ready my crossbow and creep toward the growl.</div></div>
          <div class="msg dm"><div class="who">Dungeon Master</div><div class="body"><em>Roll Stealth</em> — DC 13 to close the distance unseen.</div></div>
        </div>
        <div class="input"><input class="field" placeholder="What do you do?" /><span class="send">Send</span></div>
        <div class="nav"><span class="it">Cargo</span><span class="it on">Play</span><span class="it">Journal</span><span class="it">Settings</span></div>
      `;
    }
    const styles = [
      { cls:'dense',   name:'1 · Dense',   desc:'Info-first, compact, hairline borders. Most on screen at once (v1 heritage).' },
      { cls:'airy',    name:'2 · Airy',    desc:'Spacious, larger type. DM reads as full-width prose, not a bubble. Calm, story-forward.' },
      { cls:'tactile', name:'3 · Tactile', desc:'Chunky rounded cards, soft shadows, bubble chat, big touch targets. Easiest one-handed / for the kid.' },
    ];
    document.getElementById('lineup').innerHTML = styles.map(s => `
      <div class="col"><div class="col-label"><div class="name">${s.name}</div><div class="desc">${s.desc}</div></div>
      <div class="phone ${s.cls}"><div class="screen">${screen()}</div></div></div>`).join('');
  </script>
</body>
</html>
