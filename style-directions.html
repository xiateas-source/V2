<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V2 — Visual Style Directions</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0c0c10;
    color: #ddd;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    padding: 24px 12px 60px;
  }
  .intro { max-width: 1200px; margin: 0 auto 28px; text-align: center; }
  .intro h1 { font-size: 22px; margin-bottom: 6px; }
  .intro p { color: #999; font-size: 14px; line-height: 1.5; }
  .lineup {
    display: flex; flex-wrap: wrap; gap: 28px;
    justify-content: center; align-items: flex-start; max-width: 1300px; margin: 0 auto;
  }
  .col { width: 360px; }
  .col-label { text-align: center; margin-bottom: 10px; }
  .col-label .name { font-size: 16px; font-weight: 700; }
  .col-label .desc { font-size: 12px; color: #888; margin-top: 2px; line-height: 1.4; }

  /* phone frame */
  .phone {
    width: 360px; height: 740px; border-radius: 36px; overflow: hidden;
    border: 3px solid #2a2a32; display: flex; flex-direction: column; position: relative;
  }
  .screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* shared structural pieces (skinned per style via CSS vars) */
  .banner { display:flex; align-items:center; gap:10px; padding:10px 14px; font-size:12px; }
  .banner .loc { font-weight:700; }
  .banner .dot { opacity:.5; }
  .tiles { display:flex; gap:8px; padding:8px 12px; }
  .tile { flex:1; padding:8px 10px; }
  .tile .nm { font-size:13px; font-weight:700; display:flex; justify-content:space-between; }
  .tile .cls { font-size:10px; opacity:.7; }
  .hpbar { height:5px; border-radius:3px; margin:6px 0 4px; overflow:hidden; }
  .hpfill { height:100%; }
  .tile .hp { font-size:11px; }
  .situ { display:flex; gap:6px; padding:4px 12px 8px; font-size:11px; overflow:hidden; }
  .chip { padding:3px 9px; border-radius:20px; white-space:nowrap; }
  .feed { flex:1; padding:10px 14px; display:flex; flex-direction:column; gap:12px; overflow:hidden; }
  .msg { font-size:13px; line-height:1.5; }
  .msg.dm .who { font-size:10px; text-transform:uppercase; letter-spacing:.06em; opacity:.6; margin-bottom:3px; }
  .msg.dm .body { }
  .msg.dm .body em { font-style:italic; }
  .pills { display:flex; gap:6px; margin-top:7px; flex-wrap:wrap; }
  .pill { font-size:10px; padding:2px 8px; border-radius:5px; }
  .msg.me { align-self:flex-end; max-width:80%; padding:8px 12px; }
  .msg.me .body { font-size:13px; }
  .tabs { display:flex; gap:4px; padding:6px 12px 0; font-size:12px; }
  .tab { padding:5px 12px; }
  .input { display:flex; gap:8px; padding:10px 12px; align-items:center; }
  .field { flex:1; padding:9px 12px; font-size:13px; }
  .send { padding:9px 14px; font-weight:700; font-size:13px; }
  .nav { display:flex; }
  .nav .it { flex:1; text-align:center; padding:11px 0 14px; font-size:11px; }

  /* ════════ A · "Hearth" — warm immersive fantasy ════════ */
  .hearth .screen { background:#1a1410; color:#e8ddc8; font-family: Georgia, 'Times New Roman', serif; }
  .hearth .banner { background:#241a13; border-bottom:1px solid #3a2a1d; color:#c9a86a; }
  .hearth .banner .loc { color:#e8c98a; }
  .hearth .tiles { background:#1a1410; }
  .hearth .tile { background:#241a13; border:1px solid #3a2a1d; border-radius:8px; }
  .hearth .hpbar { background:#3a2a1d; }
  .hearth .situ .chip { background:#2e2117; color:#c9a86a; border:1px solid #4a3420; }
  .hearth .situ .chip.main { background:#5a3e1c; color:#f0d9a0; }
  .hearth .feed { }
  .hearth .msg.dm .who { color:#b8923f; }
  .hearth .msg.dm .body { color:#e8ddc8; }
  .hearth .pill { background:#3a2a16; color:#e0b860; border:1px solid #5a4220; }
  .hearth .msg.me { background:#3a2c1d; border-radius:12px 12px 3px 12px; color:#f0e6d2; }
  .hearth .tabs .tab { color:#9a8666; border-bottom:2px solid transparent; }
  .hearth .tabs .tab.on { color:#e8c98a; border-bottom:2px solid #c9a86a; }
  .hearth .input { background:#241a13; border-top:1px solid #3a2a1d; }
  .hearth .field { background:#14100b; border:1px solid #3a2a1d; border-radius:18px; color:#e8ddc8; }
  .hearth .send { background:#7a5320; color:#f6e8c8; border-radius:18px; }
  .hearth .nav { background:#14100b; border-top:1px solid #3a2a1d; }
  .hearth .nav .it { color:#9a8666; }
  .hearth .nav .it.on { color:#e8c98a; }

  /* ════════ B · "Codex" — clean modern utility app ════════ */
  .codex .screen { background:#101216; color:#e6e9ef; }
  .codex .banner { background:#161a21; border-bottom:1px solid #232a35; color:#7d8694; }
  .codex .banner .loc { color:#e6e9ef; }
  .codex .tiles { background:#101216; }
  .codex .tile { background:#161a21; border-radius:10px; }
  .codex .hpbar { background:#232a35; }
  .codex .situ .chip { background:#1b212b; color:#9aa4b2; }
  .codex .situ .chip.main { background:#1d3a5f; color:#7cc0ff; }
  .codex .msg.dm .who { color:#6b7686; }
  .codex .msg.dm .body { color:#dfe3ea; }
  .codex .pill { background:#16302a; color:#46d6a8; }
  .codex .msg.me { background:#2563eb; border-radius:14px 14px 4px 14px; color:#fff; }
  .codex .tabs .tab { color:#6b7686; border-bottom:2px solid transparent; }
  .codex .tabs .tab.on { color:#e6e9ef; border-bottom:2px solid #2563eb; }
  .codex .input { background:#161a21; border-top:1px solid #232a35; }
  .codex .field { background:#0c0e12; border:1px solid #2a3340; border-radius:10px; color:#e6e9ef; }
  .codex .send { background:#2563eb; color:#fff; border-radius:10px; }
  .codex .nav { background:#0c0e12; border-top:1px solid #232a35; }
  .codex .nav .it { color:#6b7686; }
  .codex .nav .it.on { color:#7cc0ff; }

  /* ════════ C · "Storybook" — soft, friendly, kid-accessible ════════ */
  .story .screen { background:#f4efe6; color:#3a3530; }
  .story .banner { background:#fff; border-bottom:2px solid #ece3d3; color:#9a8f7d; }
  .story .banner .loc { color:#5a4a8a; }
  .story .tiles { background:#f4efe6; }
  .story .tile { background:#fff; border-radius:16px; box-shadow:0 2px 6px rgba(120,100,80,.10); }
  .story .hpbar { background:#ece3d3; }
  .story .situ .chip { background:#fff; color:#7a6f5d; box-shadow:0 1px 3px rgba(120,100,80,.12); }
  .story .situ .chip.main { background:#7c6bd0; color:#fff; }
  .story .msg.dm .who { color:#9a8f7d; }
  .story .msg.dm .body { color:#3a3530; }
  .story .pill { background:#e6f7ee; color:#2a9d6e; border-radius:10px; }
  .story .msg.me { background:#7c6bd0; border-radius:18px 18px 6px 18px; color:#fff; }
  .story .tabs .tab { color:#9a8f7d; }
  .story .tabs .tab.on { color:#5a4a8a; font-weight:700; }
  .story .input { background:#fff; border-top:2px solid #ece3d3; }
  .story .field { background:#f4efe6; border:2px solid #ece3d3; border-radius:22px; color:#3a3530; }
  .story .send { background:#7c6bd0; color:#fff; border-radius:22px; }
  .story .nav { background:#fff; border-top:2px solid #ece3d3; }
  .story .nav .it { color:#9a8f7d; }
  .story .nav .it.on { color:#7c6bd0; font-weight:700; }
</style>
</head>
<body>
  <div class="intro">
    <h1>Pick a feel — three directions for the play screen</h1>
    <p>Same screen, three skins. This is about the <b>vibe</b> (color, shape, type), not the final layout.<br>Open on your phone. Tell me which one feels like Tinklepebble — or what to pull from each.</p>
  </div>

  <div class="lineup" id="lineup"></div>

  <script>
    // one content template, stamped into each style — so only the look differs
    function screen() {
      return `
        <div class="banner">
          <span class="loc">🏚 Hunting Lodge Ruins</span>
          <span class="dot">·</span><span>Day 26, 1:15 AM</span>
          <span class="dot">·</span><span>Clear</span>
        </div>
        <div class="tiles">
          <div class="tile">
            <div class="nm">Ivy <span class="hp">31/31</span></div>
            <div class="cls">Rogue 4</div>
            <div class="hpbar"><div class="hpfill" style="width:100%;background:#4caf50;"></div></div>
          </div>
          <div class="tile">
            <div class="nm">Thorn <span class="hp">18/27</span></div>
            <div class="cls">Bard 4</div>
            <div class="hpbar"><div class="hpfill" style="width:66%;background:#e0a83e;"></div></div>
          </div>
        </div>
        <div class="situ">
          <span class="chip main">★ Stop the cult</span>
          <span class="chip">Find the egg</span>
          <span class="chip">Rescue Leosin</span>
        </div>
        <div class="tabs">
          <span class="tab on">Narrative</span>
          <span class="tab">OOC</span>
        </div>
        <div class="feed">
          <div class="msg dm">
            <div class="who">Dungeon Master</div>
            <div class="body">The lodge's broken door hangs on one hinge. <em>Ivy</em>, your boots find old bloodstains beneath the ash. Something moved through here — recently. A low growl rolls out of the dark.
              <div class="pills"><span class="pill">⚔ Combat</span><span class="pill">+1 Kobold</span></div>
            </div>
          </div>
          <div class="msg me"><div class="body">I ready my crossbow and creep toward the growl.</div></div>
          <div class="msg dm">
            <div class="who">Dungeon Master</div>
            <div class="body"><em>Roll Stealth</em> — DC 13 to stay unseen as you close the distance.</div>
          </div>
        </div>
        <div class="input">
          <input class="field" placeholder="What do you do?" />
          <span class="send">Send</span>
        </div>
        <div class="nav">
          <span class="it">Cargo</span>
          <span class="it on">Play</span>
          <span class="it">Journal</span>
          <span class="it">Settings</span>
        </div>
      `;
    }
    const styles = [
      { cls:'hearth', name:'A · Hearth', desc:'Warm, immersive fantasy. Serif, candlelit, feels like a story being told.' },
      { cls:'codex',  name:'B · Codex',  desc:'Clean modern app. High-contrast, fast, one-handed. Game-as-tool.' },
      { cls:'story',  name:'C · Storybook', desc:'Soft, friendly, light. Rounded, gentle — easiest for the kid player.' },
    ];
    document.getElementById('lineup').innerHTML = styles.map(s => `
      <div class="col">
        <div class="col-label"><div class="name">${s.name}</div><div class="desc">${s.desc}</div></div>
        <div class="phone ${s.cls}"><div class="screen">${screen()}</div></div>
      </div>
    `).join('');
  </script>
</body>
</html>
