<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #111; color: #eee; padding: 16px; padding-bottom: 80px; }
h1 { font-size: 1.2rem; text-align: center; margin-bottom: 8px; }
.section-label { font-size: 1rem; font-weight: 700; text-align: center; margin: 24px 0 12px; padding: 8px; border-radius: 8px; }
.dark-label { background: #222; color: #ccc; }
.light-label { background: #e0e0e0; color: #333; }

.palette-card {
  border-radius: 16px;
  margin-bottom: 16px;
  overflow: hidden;
  border: 2px solid transparent;
  transition: border-color 0.2s;
}
.palette-card.selected { border-color: #fff; }

.palette-header {
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.palette-name { font-size: 0.9rem; font-weight: 700; }
.palette-tag { font-size: 0.7rem; opacity: 0.6; }

/* Mini chat mockup */
.mini-chat {
  padding: 8px 12px;
}
.mini-msg {
  border-radius: 12px;
  padding: 8px 12px;
  margin-bottom: 6px;
  font-size: 0.8rem;
  line-height: 1.4;
}
.mini-msg.dm { margin-right: 40px; }
.mini-msg.player { margin-left: 40px; text-align: right; }
.mini-msg.system { text-align: center; font-size: 0.7rem; opacity: 0.7; margin: 4px 20px; }

.mini-pill {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 0.7rem;
  font-weight: 600;
  margin: 2px 2px;
}

/* Bottom bar mockup */
.mini-bar {
  display: flex;
  align-items: center;
  padding: 8px 12px;
  gap: 8px;
}
.mini-input {
  flex: 1;
  border-radius: 20px;
  padding: 8px 14px;
  font-size: 0.75rem;
  border: 1px solid;
}
.mini-send {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
}

/* Nav mockup */
.mini-nav {
  display: flex;
  justify-content: space-around;
  padding: 8px 0;
  font-size: 0.65rem;
  font-weight: 600;
}
.mini-nav span { opacity: 0.5; }
.mini-nav span.active { opacity: 1; }

/* Swatch strip */
.swatch-strip {
  display: flex;
  height: 6px;
}
.swatch-strip div { flex: 1; }
</style>
</head>

function renderPalette(p, index) {
  const isLight = p.mode === 'light';
  return `
    <div class="palette-card" id="pal-${index}" onclick="this.classList.toggle('selected')" style="background:${p.bg}">
      <div class="swatch-strip">
        <div style="background:${p.bg}"></div>
        <div style="background:${p.surface}"></div>
        <div style="background:${p.surfaceAlt}"></div>
        <div style="background:${p.accent}"></div>
        <div style="background:${p.success}"></div>
        <div style="background:${p.warning}"></div>
        <div style="background:${p.danger}"></div>
      </div>
      <div class="palette-header" style="color:${p.text}">
        <span class="palette-name">${index + 1}. ${p.name}</span>
        <span class="palette-tag" style="color:${p.textMuted}">${p.tag}</span>
      </div>
      <div class="mini-chat" style="background:${p.bg}">
        <div class="mini-msg dm" style="background:${p.dmBubble}; color:${p.text}">
          The ancient door groans open. Flickering torchlight reveals a chamber lined with crumbling bookshelves.
          <div style="margin-top:4px;">
            <span class="mini-pill" style="background:${p.danger}22; color:${p.danger}">hp: -5</span>
            <span class="mini-pill" style="background:${p.success}22; color:${p.success}">item_add</span>
            <span class="mini-pill" style="background:${p.accent}22; color:${p.accent}">quest_add</span>
          </div>
        </div>
        <div class="mini-msg player" style="background:${p.playerBubble}; color:${p.text}">
          Valenns searches the bookshelves for anything magical.
        </div>
        <div class="mini-msg system" style="color:${p.textMuted}">
          Roll Request: Investigation (Valenns) | DC 14
        </div>
        <div class="mini-msg dm" style="background:${p.dmBubble}; color:${p.text}">
          <span style="color:${p.accent}; font-weight:600;">DM:</span> Roll your Investigation check, Valenns. The shelves are packed tight with dust and debris.
        </div>
      </div>
      <div class="mini-bar" style="background:${p.surface}">
        <div class="mini-input" style="background:${p.inputBg}; color:${p.textMuted}; border-color:${p.border}">What do you do?</div>
        <div class="mini-send" style="background:${p.accent}; color:${isLight ? '#fff' : p.bg}">&#9889;</div>
      </div>
      <div class="mini-nav" style="background:${p.navBg}; color:${p.text}">
        <span class="active" style="color:${p.accent}">Cargo</span>
        <span>Journal</span>
        <span>Settings</span>
      </div>
    </div>
  `;
}

const container = document.getElementById('palettes');
let html = '';
const darks = palettes.filter(p => p.mode === 'dark');
const lights = palettes.filter(p => p.mode === 'light');

darks.forEach((p, i) => { html += renderPalette(p, i); });
html += '<div class="section-label light-label">LIGHT MODES (10)</div>';
lights.forEach((p, i) => { html += renderPalette(p, i + 10); });

container.innerHTML = html;
