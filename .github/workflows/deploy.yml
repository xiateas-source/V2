name: Deploy to Firebase Hosting

# Auto-deploy on every push to main. No manual step — land changes on main
# (merge a branch or push) and the live site updates within ~2 minutes.
on:
  push:
    branches: [main]
  workflow_dispatch: {}   # also allows a manual "Run workflow" button in the Actions tab

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PEBBLE_V2 }}
          channelId: live
          projectId: pebble-v2

      # database.rules.json drifted from the deployed Console rules because nothing
      # ever pushed it — hosting-deploy above only touches static assets. Deploy it
      # explicitly so the committed file is the actual source of truth.
      - name: Deploy database rules
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
          npx firebase-tools deploy --only database --project pebble-v2 --non-interactive
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PEBBLE_V2 }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
